name: update-calendar

on:
  schedule:
    - cron: "0 6 * * *"   # каждый день 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download ICS
        run: |
          URL="https://uspu.ru/education/eios/schedule/calendar/calendar_filter/calendar_БХ-2331_22.04.2026%2012%3A00%3A00_13.05.2026%2012%3A00%3A00.ics"

          echo "Downloading ICS..."

          curl --http1.1 \
               --retry 5 \
               --retry-delay 3 \
               --fail \
               -L "$URL" -o calendar_new.ics || true

      - name: Validate file
        run: |
          echo "Checking file..."

          if [ -s calendar_new.ics ]; then
            echo "Valid ICS downloaded"
            mv calendar_new.ics calendar.ics
          else
            echo "Download failed or empty file — keeping old calendar"
            if [ ! -f calendar.ics ]; then
              echo "No existing fallback calendar found — creating empty one"
              cat <<EOF > calendar.ics
BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Uni Schedule//RU
END:VCALENDAR
EOF
            fi
          fi

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add calendar.ics

          git commit -m "update calendar" || echo "no changes to commit"

          git push
