name: update-ics

on:
  schedule:
    - cron: "0 6 * * *"   # каждый день
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download ICS
        run: |
          curl --http1.1 -L "https://uspu.ru/education/eios/schedule/calendar/calendar_filter/calendar_БХ-2331_22.04.2026%2012%3A00%3A00_13.05.2026%2012%3A00%3A00.ics" -o calendar.ics

      - name: Commit file
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calendar.ics
          git commit -m "update calendar" || echo "no changes"
          git push
